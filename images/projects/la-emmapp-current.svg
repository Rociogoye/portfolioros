<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Vista actualizada de La EmmApp</title>
  <desc id="desc">Interfaz de una aplicación para gestionar mascotas, con navegación superior, tarjeta principal y panel de acciones.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17172a"/>
      <stop offset="1" stop-color="#0d1020"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2542"/>
      <stop offset="1" stop-color="#161728"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7b3ff"/>
      <stop offset="1" stop-color="#9b6cff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <circle cx="1060" cy="120" r="170" fill="#ff8fb1" opacity=".14"/>
  <circle cx="120" cy="650" r="200" fill="#8d6bff" opacity=".16"/>
  <rect x="70" y="58" width="1060" height="634" rx="34" fill="#f6f2fb"/>
  <rect x="70" y="58" width="1060" height="72" rx="34" fill="#efe5fb"/>
  <circle cx="114" cy="94" r="18" fill="url(#accent)"/>
  <circle cx="142" cy="84" r="10" fill="#9b6cff" opacity=".9"/>
  <circle cx="151" cy="104" r="8" fill="#9b6cff" opacity=".9"/>
  <circle cx="131" cy="108" r="8" fill="#9b6cff" opacity=".9"/>
  <text x="172" y="102" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#4b3f86">EmmApp</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#231f3b">
    <text x="320" y="100">Inicio</text>
    <text x="395" y="100">Cuida su salud</text>
    <text x="530" y="100">Mis mascotas</text>
    <text x="649" y="100">Registrar mascota</text>
    <text x="835" y="100">Hola, Admin</text>
    <text x="930" y="100">Cerrar sesión</text>
  </g>
  <text x="600" y="205" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700" fill="#50498d">Mis mascotas</text>
  <text x="600" y="242" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#6b6780">Consulta, edita o elimina la información de cada mascota.</text>

  <rect x="100" y="300" width="1000" height="210" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#6f5ca6" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect x="130" y="330" width="185" height="150" rx="22" fill="#d7cce7"/>
  <circle cx="222" cy="401" r="48" fill="#ffffff"/>
  <circle cx="196" cy="372" r="12" fill="#ffffff"/>
  <circle cx="248" cy="372" r="12" fill="#ffffff"/>
  <circle cx="185" cy="395" r="14" fill="#ffffff"/>
  <circle cx="259" cy="395" r="14" fill="#ffffff"/>
  <circle cx="222" cy="406" r="18" fill="#5d548b"/>
  <text x="350" y="383" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#4b3f86">EMMA</text>
  <text x="350" y="417" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#6f6780">Ficha de mascota, vacunas, medicación y citas.</text>
  <rect x="730" y="360" width="98" height="34" rx="17" fill="#d7b3ff"/>
  <rect x="838" y="360" width="98" height="34" rx="17" fill="#c89fff"/>
  <rect x="946" y="360" width="100" height="34" rx="17" fill="#7f2dc5"/>
  <text x="779" y="381" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#4d1c87">Ver ficha</text>
  <text x="887" y="381" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#4d1c87">Editar</text>
  <text x="996" y="381" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Eliminar</text>

  <rect x="98" y="560" width="150" height="42" rx="21" fill="#d7b3ff"/>
  <text x="173" y="587" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#5b1ea4">Volver al inicio</text>

  <rect x="70" y="620" width="1060" height="72" rx="0" fill="#efe5fb"/>
  <text x="118" y="662" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#4b3f86">EmmApp</text>
  <text x="420" y="662" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4b3f86">Enlaces</text>
  <text x="760" y="662" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4b3f86">Contacto</text>
</svg>
