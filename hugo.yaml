        socialLinks:
          fontAwesomeIcons:
            - icon: "fab fa-github"
              url: "https://github.com/Rociogoye"
            - icon: "fab fa-linkedin-in"
              url: "https://www.linkedin.com/in/rocio-goyeneche-jazbec/"

      about:
        enable: true
        title: "About me"
        content: |-
          I am Rocío, a `web content specialist` with more than 10 years of experience in digital content, campaigns, coordination with creative teams, and editorial quality control. My professional background is in communication and digital marketing, and from there I expanded into web work to connect strategy, content, and development in one profile.

          I completed a 560-hour course in website creation and publishing, focused on HTML, CSS, basic JavaScript, responsive design, accessibility, publishing, and website maintenance. I am also finishing a 150-hour Junior JavaScript Programmer with AI course, focused on algorithms, problem solving, applied AI, and JavaScript applications.

          I enjoy combining content, design, and development to build clear, useful, well-resolved websites. I work with WordPress as a CMS and also with Hugo.io, and I am learning Node.js, Ollama, and other AI tools for coding and productivity.
        skills:
          enable: true
