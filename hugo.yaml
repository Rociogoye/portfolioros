baseURL: "http://localhost:1313/"
locale: "es-es"
defaultContentLanguage: "es"
defaultContentLanguageInSubdir: false
title: "Rocío Goyeneche Jazbec | Desarrollo web"
theme: "hugo-profile"

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  title: "Rocío Goyeneche Jazbec"
  description: "Portfolio de Rocío Goyeneche Jazbec, profesional de comunicación, marketing digital y desarrollo web."
  favicon: "/images/favicon.svg"
  animate: true
  useBootstrapCDN: false

  theme:
    defaultTheme: "dark"
    disableThemeToggle: false

  color:
    textColor: "#22243a"
    secondaryTextColor: "#62647a"
    textLinkColor: "#a13d63"
    backgroundColor: "#fff9f6"
    secondaryBackgroundColor: "#f4e7eb"
    primaryColor: "#a13d63"
    secondaryColor: "#fffefe"
    darkmode:
      textColor: "#f6eef2"
      secondaryTextColor: "#c8bac5"
      textLinkColor: "#ff9fbd"
      backgroundColor: "#0d1020"
      secondaryBackgroundColor: "#19162b"
      primaryColor: "#ff8fb1"
      secondaryColor: "#15182b"

  font:
    fontSize: "1.05rem"
    fontWeight: 400
    lineHeight: 1.7
    textAlign: left

  navbar:
    brandName: "Rocío.dev"
    showBrandLogo: false
    disableSearch: true
    align: "ms-auto"
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: true
      disableEducation: false
      disableProjects: false
      disableAchievements: true
      disableContact: false

languages:
  es:
    label: "Español"
    weight: 1
    params:
      hero:
        enable: true
        intro: "Hola, soy Rocío."
        title: ""
        subtitle: "Content web, comunicación y marketing digital."
        content: "Creo y organizo experiencias digitales con foco en contenido, estructura y claridad visual. Combino criterio editorial, CMS y formación web para construir proyectos cuidados y funcionales."
        image: "/images/hero-portfolio.svg"
        bottomImage:
          enable: false
        button:
          enable: true
          name: "Ver mis proyectos"
          url: "#projects"
          download: false
          newPage: false
        socialLinks:
          fontAwesomeIcons:
            - icon: "fab fa-github"
              url: "https://github.com/Rociogoye"
            - icon: "fab fa-linkedin-in"
              url: "https://www.linkedin.com/in/rocio-goyeneche-jazbec/"

      about:
        enable: true
        title: "Sobre mí"
        content: |-
          Soy Rocío, `web content specialist` con más de 10 años de experiencia en contenidos digitales, campañas, coordinación con equipos creativos y control de calidad editorial. Mi base profesional está en la comunicación y el marketing digital, y desde ahí fui ampliando mi perfil hacia la web para unir estrategia, contenido y desarrollo en un mismo trabajo.

          He realizado el curso de Confección y Publicación de Páginas Web de 560 horas, con foco en HTML, CSS, JavaScript básico, responsive design, accesibilidad, publicación y mantenimiento web. También estoy finalizando una formación de 150 horas de Programador Junior de JavaScript con IA, centrada en algorítmica, resolución de problemas, inteligencia artificial aplicada y desarrollo de aplicaciones con JavaScript.

          Me interesa combinar contenido, diseño y desarrollo para crear webs claras, útiles y bien resueltas. Trabajo con WordPress como CMS y también con Hugo.io, y estoy aprendiendo a usar Node.js, Ollama y otras herramientas de IA aplicadas al código y a la productividad.
        skills:
          enable: true
          title: "Tecnologías y herramientas con las que trabajo:"
          items:
            - "Web content y gestión editorial"
            - "Comunicación y marketing digital"
            - "Gestión de contenidos y CMS"
            - "WordPress, Elementor y Hugo.io"
            - "HTML5, CSS3 y responsive design"
            - "JavaScript y bases de algorítmica"
            - "PHP, MySQL, Git y GitHub"
            - "Node.js, Ollama y herramientas de IA"
            - "Accesibilidad y control editorial"

      experience:
        enable: false

      education:
        enable: true
        title: "Formación"
        index: false
        items:
          - title: "Confección y publicación de páginas web"
            school:
              name: "CIFO Barcelona La Violeta"
            date: "560 horas"
            content: "Formación práctica en desarrollo frontend, PHP, MySQL, accesibilidad, publicación y mantenimiento de sitios web."
          - title: "Programador Junior de JavaScript con IA"
            school:
              name: "Formación en curso"
            date: "150 horas"
            content: "Especialización en JavaScript y herramientas con IA, orientada a reforzar lógica, interacción, desarrollo frontend y automatización de tareas."
          - title: "Licenciatura en Comunicación"
            school:
              name: "Universidad Nacional de General Sarmiento"
            date: "Finalizada"
            content: "Base sólida en análisis de comunicación, producción de contenidos y lectura crítica de contextos, aplicada hoy al entorno digital."

      achievements:
        enable: false

      projects:
        enable: true
        title: "Proyectos seleccionados"

      contact:
        enable: true
        title: "Hablemos"
        content: "Estoy abierta a colaborar en proyectos web, de contenido y de marketing digital donde haya que definir, organizar y sacar trabajo adelante con criterio."
        btnName: "Visitar mi GitHub"
        btnLink: "https://github.com/Rociogoye"

      footer:
        recentPosts:
          enable: false
        socialNetworks:
          github: "https://github.com/Rociogoye"
          linkedin: "https://www.linkedin.com/in/rocio-goyeneche-jazbec/"
  en:
    label: "English"
    weight: 2
    params:
      hero:
        enable: true
        intro: "Hi, I'm Rocío."
        title: ""
        subtitle: "Content, communication, and digital marketing."
        content: "I create and organize digital experiences with a focus on content, structure, and visual clarity. I combine editorial judgment, CMS work, and web training to build thoughtful, functional projects."
        image: "/images/hero-portfolio.svg"
        bottomImage:
          enable: false
        button:
          enable: true
